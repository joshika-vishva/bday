<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Memories 🎥</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #f472b6;
            --accent: #fb7185;
            --glow: rgba(244, 114, 182, 0.4);
        }

        body {
            background: #ffffff !important;
            color: #1a1b1e !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            width: 100vw;
        }

        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 50% 50%, #fffcfd 0%, #fff5f8 100%);
        }

        .ambient-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
        }

        .floating {
            position: absolute;
            animation: float 20s infinite linear alternate;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
            }

            100% {
                transform: translate(100px, 150px) rotate(20deg) scale(1.1);
            }
        }

        .video-page-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            padding: 2rem;
        }

        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.05);
            color: #1a1b1e;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(20px);
            transition: 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.05) translateX(-5px);
            background: var(--primary);
            color: white;
        }

        .video-stage {
            position: relative;
            width: 85vw;
            height: 65vh;
            max-width: 1200px;
            margin-bottom: 2rem;
            perspective: 2000px;
        }

        .video-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110%;
            height: 110%;
            background: var(--glow);
            filter: blur(100px);
            border-radius: 40px;
            opacity: 0.6;
            z-index: -1;
        }

        .video-frame {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
            transition: 0.5s ease;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-metadata {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 1.2rem 3rem;
            border-radius: 25px;
            text-align: center;
            min-width: 320px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            animation: fadeInUp 1s both 0.5s;
            z-index: 20;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-title {
            font-size: 2.22rem;
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            background: linear-gradient(45deg, #1a1b1e, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.1rem;
        }

        .video-tag {
            color: #888;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }
    </style>
</head>

<body>
    <div class="ambient-bg"></div>
    <div class="ambient-elements">
        <div class="floating" style="top: 15%; right: 10%; font-size: 4rem;">🐼</div>
        <div class="floating" style="bottom: 20%; left: 15%; font-size: 4rem; animation-delay: -5s;">🐼</div>
    </div>
    <div class="video-page-container">
        <a href="index.html" class="back-btn"><i class="ph-bold ph-arrow-left"></i> BACK</a>
        <div class="video-stage">
            <div class="video-glow"></div>
            <div class="video-frame"><video src="assets/video-1.mp4" controls autoplay loop></video></div>
        </div>
        <div class="video-metadata">
            <p class="video-tag">Our Moments</p>
            <h1 class="video-title">Special Memory #1 ❤️‍🩹</h1>
        </div>
    </div>
</body>

</html>
